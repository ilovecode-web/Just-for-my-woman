<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Danica</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}

#startScreen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#startBtn {
  font-size: 35px;
  padding: 20px 45px;
  border: none;
  border-radius: 50px;
  background: #ff5ebc;
  color: white;
  box-shadow: 0 0 20px #ff5ebc, 0 0 45px #ff5ebc;
  cursor: pointer;
}

#heartPage {
  opacity: 0;
  transition: opacity 3s ease;
}

.heart {
  position: relative;
  width: 700px;
  height: 600px;
}

.text {
  position: absolute;
  color: #ff7acb;
  font-size: 16px;
  white-space: nowrap;
  text-shadow: 0 0 8px #ff4db8, 0 0 18px #ff4db8;
  animation: glow 2s ease-in-out infinite alternate;
}

.center-message {
  position: absolute;
  top: 60%;
  left: 57%;
  transform: translate(-50%, -50%);
  color: #ff8adf;
  font-size: 48px;
  font-family: cursive;
  text-align: center;
  text-shadow: 0 0 10px #ff4db8, 0 0 25px #ff4db8;
  z-index: 10;
}

.center-message span {
  color: #78c7ff;
  text-shadow: 0 0 10px #45b6ff, 0 0 25px #45b6ff;
}

.sparkle {
  position: absolute;
  color: #ffb6f2;
  font-size: 18px;
  animation: twinkle 1.5s infinite alternate;
}

.rose {
  position: fixed;
  top: -50px;
  font-size: 32px;
  animation: fall linear forwards;
  z-index: 50;
  pointer-events: none;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}

@keyframes glow {
  from {
    opacity: 0.35;
    transform: scale(0.85);
  }
  to {
    opacity: 1;
    transform: scale(1.15);
  }
}

@keyframes twinkle {
  from {
    opacity: 0.2;
    transform: scale(0.6);
  }
  to {
    opacity: 1;
    transform: scale(1.4);
  }
}
</style>
</head>

<body>

<div id="startScreen">
  <button id="startBtn">❤️ Click Me ❤️</button>
</div>

<div id="heartPage">
  <div class="heart" id="heart">
    <div class="center-message">
      May I be your<br>
      <span>pretend wife?</span>
    </div>
  </div>
</div>

<script>
const heart = document.getElementById("heart");

for (let i = 0; i < 140; i++) {
  let t = Math.random() * Math.PI * 2;

  let x = 16 * Math.pow(Math.sin(t), 3);
  let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

  let text = document.createElement("div");
  text.className = "text";
  text.innerText = "I love you Danica";

  text.style.left = (350 + x * 25) + "px";
  text.style.top = (300 + y * 25) + "px";
  text.style.fontSize = (8 + Math.random() * 6) + "px";
  text.style.animationDelay = Math.random() * 2 + "s";

  heart.appendChild(text);
}

for (let i = 0; i < 80; i++) {
  let sparkle = document.createElement("div");
  sparkle.className = "sparkle";
  sparkle.innerText = Math.random() > 0.5 ? "✦" : "♡";

  sparkle.style.left = Math.random() * 700 + "px";
  sparkle.style.top = Math.random() * 600 + "px";
  sparkle.style.animationDelay = Math.random() * 2 + "s";

  heart.appendChild(sparkle);
}

const startBtn = document.getElementById("startBtn");
const startScreen = document.getElementById("startScreen");
const heartPage = document.getElementById("heartPage");

startBtn.addEventListener("click", () => {
  startScreen.style.display = "none";

  setInterval(() => {
    const rose = document.createElement("div");
    rose.className = "rose";
    rose.innerText = "🌹";
    rose.style.left = Math.random() * 100 + "vw";
    rose.style.animationDuration = (3 + Math.random() * 3) + "s";
    document.body.appendChild(rose);

    setTimeout(() => {
      rose.remove();
    }, 6000);
  }, 250);

  setTimeout(() => {
    heartPage.style.opacity = "1";
  }, 800);
});
</script>

</body>
</html>
