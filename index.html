<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Danica</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}

.heart {
  position: relative;
  width: 700px;
  height: 600px;
}

.text {
  position: absolute;
  color: #ff7acb;
  font-size: 16px;
  white-space: nowrap;
  text-shadow: 0 0 8px #ff4db8, 0 0 18px #ff4db8;
  animation: glow 2s ease-in-out infinite alternate;
}

.center-message {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ff8adf;
  font-size: 48px;
  font-family: cursive;
  text-align: center;
  text-shadow: 0 0 10px #ff4db8, 0 0 25px #ff4db8;
  z-index: 10;
}

.center-message span {
  color: #78c7ff;
  text-shadow: 0 0 10px #45b6ff, 0 0 25px #45b6ff;
}

.sparkle {
  position: absolute;
  color: #ffb6f2;
  font-size: 18px;
  animation: twinkle 1.5s infinite alternate;
}

@keyframes glow {
  from {
    opacity: 0.35;
    transform: scale(0.85);
  }
  to {
    opacity: 1;
    transform: scale(1.15);
  }
}

@keyframes twinkle {
  from {
    opacity: 0.2;
    transform: scale(0.6);
  }
  to {
    opacity: 1;
    transform: scale(1.4);
  }
}
</style>
</head>

<body>

<div class="heart" id="heart">
  <div class="center-message">
    May I be your<br>
    <span>pretend wife?</span>
  </div>
</div>

<script>
const heart = document.getElementById("heart");

for (let i = 0; i < 180; i++) {
  let t = Math.random() * Math.PI * 2;

  let x = 16 * Math.pow(Math.sin(t), 3);
  let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

  let text = document.createElement("div");
  text.className = "text";
  text.innerText = "I love you Danica";

  text.style.left = (350 + x * 13) + "px";
  text.style.top = (300 + y * 13) + "px";
  text.style.fontSize = (8 + Math.random() * 6) + "px";
  text.style.animationDelay = Math.random() * 2 + "s";

  heart.appendChild(text);
}

for (let i = 0; i < 80; i++) {
  let sparkle = document.createElement("div");
  sparkle.className = "sparkle";
  sparkle.innerText = Math.random() > 0.5 ? "✦" : "♡";

  sparkle.style.left = Math.random() * 700 + "px";
  sparkle.style.top = Math.random() * 600 + "px";
  sparkle.style.animationDelay = Math.random() * 2 + "s";

  heart.appendChild(sparkle);
}
</script>

</body>
</html>
